name: CI HealthAI Coach

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: pytest-ci-dummy-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Coverage report
        run: pytest tests/ --cov=api --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [api-tests, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t healthai-api:ci .

      - name: Build front image
        run: docker build -f Dockerfile.front --build-arg VITE_API_BASE_URL=http://localhost:8000 -t healthai-front:ci .
